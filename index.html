<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Endless Survivors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="titleScreen">
        <h1>エンドレスサバイバーズ</h1>
        <div id="instructions">
            <h2>操作方法 (Operation Instructions)</h2>
            <p>移動 (Move): [↑][↓][←][→] (Arrow Keys) / [W][A][S][D] キー</p>
            <p>攻撃 (Attack): 自動 (Automatic)</p>
            <p>目的 (Objective): できるだけ長く生き残る (Survive as long as possible)</p>
        </div>
        <button id="startGameButton">ゲーム開始 (Start Game)</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
